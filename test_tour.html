<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Test Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="static/css/tour.css">
    <style>
        body { padding: 2rem; }
        .test-section { margin: 2rem 0; padding: 2rem; border: 1px solid #ddd; border-radius: 10px; }
        .test-button { margin: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="main-title">Interactive Tour Test Page</h1>
        
        <div class="test-section">
            <h2 id="section-1">Section 1: Dashboard Overview</h2>
            <p>This section demonstrates the dashboard tour functionality.</p>
            <button class="btn btn-primary test-button" id="btn-1">Primary Button</button>
            <button class="btn btn-secondary test-button" id="btn-2">Secondary Button</button>
        </div>
        
        <div class="test-section">
            <h2 id="section-2">Section 2: Settings Management</h2>
            <p>This section demonstrates the settings tour functionality.</p>
            <div class="btn-group" role="group">
                <button class="btn btn-outline-primary" id="btn-3">Option 1</button>
                <button class="btn btn-outline-primary" id="btn-4">Option 2</button>
                <button class="btn btn-outline-primary" id="btn-5">Option 3</button>
            </div>
        </div>
        
        <div class="test-section">
            <h2 id="section-3">Section 3: Tour Controls</h2>
            <p>Test the tour system with these controls:</p>
            <button class="btn btn-success test-button" onclick="startTestTour()">Start Test Tour</button>
            <button class="btn btn-warning test-button" onclick="resetTourStatus()">Reset Tour Status</button>
            <button class="btn btn-info test-button" onclick="checkTourStatus()">Check Tour Status</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/tour.js"></script>
    <script>
        // Test tour steps
        const TEST_TOUR_STEPS = [
            {
                target: '#main-title',
                title: 'Welcome to the Test Page!',
                content: 'This is a test page to demonstrate the interactive tour system. You can see how the tour highlights different elements and guides users through the interface.',
                onShow: () => {
                    console.log('Showing step 1');
                }
            },
            {
                target: '#section-1',
                title: 'Dashboard Section',
                content: 'This represents the dashboard area where users can see their financial overview and quick actions.',
                onShow: () => {
                    console.log('Showing step 2');
                }
            },
            {
                target: '#btn-1',
                title: 'Action Buttons',
                content: 'These are action buttons that users can interact with. The tour system can highlight any element on the page.',
                onShow: () => {
                    console.log('Showing step 3');
                }
            },
            {
                target: '#section-2',
                title: 'Settings Section',
                content: 'This represents the settings area where users can manage their scopes, saving spaces, and categories.',
                onShow: () => {
                    console.log('Showing step 4');
                }
            },
            {
                target: '#btn-3',
                title: 'Option Buttons',
                content: 'These are option buttons that demonstrate different UI elements that can be highlighted in the tour.',
                onShow: () => {
                    console.log('Showing step 5');
                }
            }
        ];

        function startTestTour() {
            if (window.interactiveTour.isActive) {
                alert('Tour is already active!');
                return;
            }
            
            window.interactiveTour.init('test-tour', TEST_TOUR_STEPS, {
                onStart: () => {
                    console.log('Test tour started');
                },
                onComplete: () => {
                    console.log('Test tour completed');
                    alert('Test tour completed! Check the console for details.');
                },
                onSkip: () => {
                    console.log('Test tour skipped');
                    alert('Test tour skipped!');
                }
            });
        }

        async function resetTourStatus() {
            try {
                const response = await fetch('/api/tour/reset', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                alert(`Tour status reset: ${data.message}`);
            } catch (error) {
                alert('Error resetting tour status: ' + error.message);
            }
        }

        async function checkTourStatus() {
            try {
                const response = await fetch('/api/tour/status');
                const data = await response.json();
                alert(`Tour completed: ${data.tour_completed}`);
            } catch (error) {
                alert('Error checking tour status: ' + error.message);
            }
        }

        // Auto-start test tour on page load (for demo purposes)
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Test page loaded. Click "Start Test Tour" to begin.');
        });
    </script>
</body>
</html>
